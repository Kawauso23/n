<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta prefix="ifiction: http://babel.ifarchive.org/protocol/iFiction/"
        property="ifiction:ifid" content="7FCDF039-2B77-4179-B795-CBAFA65253AA">

    <title>사회민주주의: 또 다른 역사</title>

    <link rel="stylesheet" type="text/css" href="game.css">

    <script src="jquery-1.11.1.min.js"></script>
    <script src="d3.v7.min.js"></script>
    <script src="d3-parliament.js"></script>
    <script src="d3-linegraph.js"></script>
    <script src="core.js"></script>
    <script src="game.js"></script>
  </head>

  <body>

    <div class="background" id="bg2"></div>
    <div class="background" id="bg1"></div>

    <!-- 설정 -->
    <div id="options" class="overlay options" style="display: none;">

        <div class="overlay_top">

            <table>

                <tr>
                    <td>배경:</td>

                    <td>
                        <label for="backgrounds_yes">켜기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="backgrounds_yes"
                               name="backgrounds"
                               value="1"
                               onclick="window.enableBg();">
                    </td>

                    <td>
                        <label for="backgrounds_no">끄기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="backgrounds_no"
                               name="backgrounds"
                               value="0"
                               onclick="window.disableBg();">
                    </td>
                </tr>

                <tr>
                    <td><hr></td>
                </tr>

                <tr>
                    <td>이벤트 이미지:</td>

                    <td>
                        <label for="images_yes">켜기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="images_yes"
                               name="images"
                               value="1"
                               onclick="window.enableImages();">
                    </td>

                    <td>
                        <label for="images_no">끄기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="images_no"
                               name="images"
                               value="0"
                               onclick="window.disableImages();">
                    </td>
                </tr>

                <tr>
                    <td><hr></td>
                </tr>

                <tr>
                    <td>애니메이션:</td>

                    <td>
                        <label for="animate_yes">켜기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="animate_yes"
                               name="animate"
                               value="1"
                               onclick="window.enableAnimate();">
                    </td>

                    <td>
                        <label for="animate_no">끄기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="animate_no"
                               name="animate"
                               value="0"
                               onclick="window.disableAnimate();">
                    </td>
                </tr>

                <tr>
                    <td><hr></td>
                </tr>

                <tr>
                    <td>음악:</td>

                    <td>
                        <label for="audio_yes">켜기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="audio_yes"
                               name="audio"
                               value="1"
                               onclick="window.enableAudio();">
                    </td>

                    <td>
                        <label for="audio_no">끄기</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="audio_no"
                               name="audio"
                               value="0"
                               onclick="window.disableAudio();">
                    </td>
                </tr>

                <tr>
                    <td><hr></td>
                </tr>

                <tr>

                    <td>화면 모드:</td>

                    <td>
                        <label for="light_mode">라이트 모드</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="light_mode"
                               name="ld_mode"
                               value="1"
                               onclick="window.enableLightMode();">
                    </td>

                    <td>
                        <label for="dark_mode">다크 모드</label>
                    </td>

                    <td>
                        <input type="radio"
                               id="dark_mode"
                               name="ld_mode"
                               value="0"
                               onclick="window.enableDarkMode();">
                    </td>

                </tr>

                <tr>

                    <td>
                        <button onclick="window.hideOptions();">
                            닫기
                        </button>
                    </td>

                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>

                    <td>
                        <button onclick="window.showMods();">
                            모드
                        </button>
                    </td>

                </tr>

            </table>

        </div>

    </div>

    <!-- 저장창 -->
    <div id="save" class="overlay saves" style="display: none;">

        <table id="saves_table" class="overlay_top">

            <tr>
                <td>자동 저장 0</td>

                <td>
                    <button class="b save_button" id="save_button_a0">
                        저장
                    </button>
                </td>

                <td>
                    <button class="b delete_button" id="delete_button_a0">
                        삭제
                    </button>
                </td>

                <td class="save_info" id="save_info_a0"></td>

                <td>
                    <button class="b export_button" id="export_button_a0">
                        내보내기
                    </button>
                </td>
            </tr>

            <tr>
                <td>자동 저장 1</td>

                <td>
                    <button class="b save_button" id="save_button_a1">
                        저장
                    </button>
                </td>

                <td>
                    <button class="b delete_button" id="delete_button_a1">
                        삭제
                    </button>
                </td>

                <td class="save_info" id="save_info_a1"></td>

                <td>
                    <button class="b export_button" id="export_button_a1">
                        내보내기
                    </button>
                </td>
            </tr>

            <tr>
                <td colspan="5">

                    <label for="import_save">
                        세이브 파일 불러오기:
                    </label>

                    <input type="file"
                           id="import_save"
                           onchange="dendryUI.importSave('import_save');">

                </td>
            </tr>

            <tr>
                <td>
                    <button onclick="dendryUI.hideSaveSlots();">
                        닫기
                    </button>
                </td>
            </tr>

        </table>

    </div>

    <!-- 스프라이트 -->
    <div id="contentSpriteContainer">

        <div class="sprite" id="topLeftSprite"></div>
        <div class="sprite" id="topRightSprite"></div>

        <div class="sprite" id="bottomLeftSprite"></div>
        <div class="sprite" id="bottomRightSprite"></div>

    </div>

    <!-- 메인 -->
    <div id='page'>

        <div id="mid_panel">

            <header>

                <h1 id="game-title">
                    사회민주주의: 또 다른 역사
                </h1>

                <h2 id="game-author">
                    테스트 버전
                </h2>

                <div id="header-links">

                    <a id="stats-link"
                       onclick="window.showStats();"
                       href="#">
                        도감
                    </a>

                    <a onclick="dendryUI.showSaveSlots();"
                       href="#">
                        저장/불러오기
                    </a>

                    <a onclick="window.showOptions();"
                       href="#">
                        설정
                    </a>

                </div>

            </header>

            <!-- 좌측 상태창 -->
            <div id="tools_wrapper">

                <div id='stats_sidebar' class='tools left'>

                    <div class="tab_container">

                        <button class="tab_button active"
                                id="main_tab"
                                onclick="window.changeTab('status', 'main_tab');">
                            메인
                        </button>

                        <button class="tab_button"
                                id="politics_tab"
                                onclick="window.changeTab('status.politics', 'politics_tab');">
                            정치
                        </button>

                        <button class="tab_button"
                                id="paramilitary_tab"
                                onclick="window.changeTab('status.paramilitaries', 'paramilitary_tab');">
                            안보
                        </button>

                        <button class="tab_button"
                                id="poll_tab"
                                onclick="window.changeTab('status.polls', 'poll_tab');">
                            여론조사
                        </button>

                    </div>

                    <div id="qualities"></div>

                </div>

            </div>

            <!-- 메인 콘텐츠 -->
            <div id='content'>
            </div>

            <footer>
            </footer>

        </div>

    </div>

  </body>
</html>
